<!DOCTYPE html>
<html>
<head>
    <title>My AI</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="chat-box">
        <h2>My AI Assistant</h2>

        <form action="/ask" method="POST">
            <input type="text" name="question" placeholder="اكتب سؤالك هنا" required>
            <button type="submit">إرسال</button>
        </form>

        <div id="messages">
            {% if answer %}
                <p>{{ answer }}</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
